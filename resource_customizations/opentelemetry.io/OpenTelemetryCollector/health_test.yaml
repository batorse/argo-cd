tests:
- healthStatus:
    status: Healthy
    message: "All replicas are ready"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Healthy
    message: "The health of sidecar collectors can not be determined, since they start no pods"
  inputPath: testdata/healthy_sidecar.yaml
- healthStatus:
    status: Degraded
    message: "No replicas are ready"
  inputPath: testdata/degraded.yaml
- healthStatus:
    status: Progressing
    message: "Replicas are starting up"
  inputPath: testdata/progressing.yaml
